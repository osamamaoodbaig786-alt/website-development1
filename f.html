<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorgeous Feedback Portal</title>
    <style>
        /* --- Elite Font & Variables --- */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            /* Cosmic Violet & Amber Deep Dark Gradient */
            background: radial-gradient(circle at bottom left, #1e1b4b 0%, #030712 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow: hidden;
            position: relative;
        }

        /* --- ✨ ANIMATION 1: Ambient Floating Light Rays --- */
        .ambient-light {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.15) 0%, transparent 65%);
            bottom: -10%;
            left: -10%;
            filter: blur(50px);
            animation: floatLight 12s infinite alternate ease-in-out;
            z-index: 1;
        }

        .ambient-light-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 65%);
            top: -10%;
            right: -10%;
            filter: blur(50px);
            animation: floatLight 10s infinite alternate-reverse ease-in-out;
            z-index: 1;
        }

        @keyframes floatLight {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -40px) scale(1.1); }
        }

        /* --- 🏛️ Premium Glassmorphic Card Container --- */
        .feedback-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            background: rgba(17, 24, 39, 0.55);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 45px 35px;
            box-shadow: 
                0 30px 70px rgba(0, 0, 0, 0.8),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            animation: cardFadeIn 1s ease-out forwards;
        }

        @keyframes cardFadeIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- Header Styling --- */
        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .form-header h2 {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 50%, #f43f5e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        /* --- 🤩 ANIMATION 2: Interactive Emoji Rating System --- */
        .rating-title {
            color: #cbd5e1;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 15px;
            text-align: center;
        }

        .emoji-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 35px;
            padding: 0 10px;
        }

        .emoji-box {
            position: relative;
        }

        /* Hide Default Radio Input completely */
        .emoji-box input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 5;
        }

        /* Styled emoji label */
        .emoji-box label {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: grayscale(60%) opacity(0.6);
        }

        .emoji-box label span {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 6px;
            font-weight: 500;
            transition: color 0.3s;
        }

        /* Hover animation trigger */
        .emoji-box:hover label {
            transform: scale(1.2);
            filter: grayscale(0%) opacity(1);
        }

        /* Radio selection check styling state */
        .emoji-box input[type="radio"]:checked + label {
            transform: scale(1.3);
            filter: grayscale(0%) opacity(1);
        }

        .emoji-box input[type="radio"]:checked + label span {
            color: #f43f5e;
            font-weight: 700;
        }

        /* --- Input Fields Styling --- */
        .input-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .input-wrapper input,
        .input-wrapper textarea {
            width: 100%;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper textarea {
            resize: none;
            height: 110px;
        }

        /* Floating Label Setup */
        .input-wrapper label {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 0.95rem;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-wrapper.textarea-fix label {
            top: 25px;
        }

        /* Focus & Valid States */
        .input-wrapper input:focus,
        .input-wrapper input:valid,
        .input-wrapper textarea:focus,
        .input-wrapper textarea:valid {
            border-color: #f43f5e;
            background: rgba(244, 63, 94, 0.02);
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.15);
        }

        .input-wrapper input:focus ~ label,
        .input-wrapper input:valid ~ label,
        .input-wrapper textarea:focus ~ label,
        .input-wrapper textarea:valid ~ label {
            top: 0;
            font-size: 0.8rem;
            color: #f43f5e;
            font-weight: 600;
            background: #0d1222; /* Blends seamlessly into frame */
            padding: 2px 8px;
            border-radius: 4px;
            transform: translateY(-50%);
        }

        /* --- ✨ ANIMATION 3: Luxury Liquid Shimmer Button --- */
        .btn-wrapper {
            margin-top: 35px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f43f5e 0%, #a855f7 100%);
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(244, 63, 94, 0.3);
            transition: all 0.4s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(168, 85, 247, 0.5);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <!-- Ambient Dynamic Lights -->
    <div class="ambient-light"></div>
    <div class="ambient-light-2"></div>

    <!-- Main Feedback Glass Framework -->
    <div class="feedback-card">
        
        <div class="form-header">
            <h2>Share Your Feedback</h2>
            <p>Your experience helps us evolve and improve</p>
        </div>

        <form action="#" method="POST">

            <!-- Custom Emoji Row -->
            <p class="rating-title">How would you rate your experience?</p>
            <div class="emoji-group">
                
                <!-- Emoji 1 -->
                <div class="emoji-box">
                    <input type="radio" name="experience_rating" id="rate-bad" required value="bad">
                    <label for="rate-bad">😞<span>Bad</span></label>
                </div>

                <!-- Emoji 2 -->
                <div class="emoji-box">
                    <input type="radio" name="experience_rating" id="rate-okay" value="okay">
                    <label for="rate-okay">😐<span>Okay</span></label>
                </div>

                <!-- Emoji 3 -->
                <div class="emoji-box">
                    <input type="radio" name="experience_rating" id="rate-good" value="good">
                    <label for="rate-good">😊<span>Good</span></label>
                </div>

                <!-- Emoji 4 -->
                <div class="emoji-box">
                    <input type="radio" name="experience_rating" id="rate-amazing" value="amazing">
                    <label for="rate-amazing">🤩<span>Loved It</span></label>
                </div>

            </div>

            <!-- Full Name Input -->
            <div class="input-wrapper">
                <input type="text" id="fullname" required autocomplete="off">
                <label for="fullname">Your Name</label>
            </div>

            <!-- Feedback Message Textarea -->
            <div class="input-wrapper textarea-fix">
                <textarea id="message" required></textarea>
                <label for="message">What can we improve or what did you like?</label>
            </div>

            <!-- Submit Premium Button -->
            <div class="btn-wrapper">
                <button type="submit" class="submit-btn">Send Anonymous Feedback</button>
            </div>

        </form>

    </div>

</body>
</html>
